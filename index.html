<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blockemon Catcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>

    <main class="game-shell">
      <header class="topbar">
        <p class="brand-kicker">Arcade Mode</p>
        <h1>
          <span class="brand-main">Blockemon</span>
          <span class="brand-accent">Catcher</span>
        </h1>
        <p class="tagline">
          Move with arrow keys.
        </p>
      </header>

      <section class="hud" aria-label="Game status">
        <div><span class="label">Score</span><strong id="score">0</strong></div>
        <div><span class="label">Best</span><strong id="best">0</strong></div>
        <div><span class="label">Missed</span><strong id="missed">0</strong></div>
      </section>

      <section class="arena-wrap">
        <canvas id="game" width="900" height="520" aria-label="Blockemon cash catcher game"></canvas>
        <div id="overlay" class="overlay">
          <h2 id="overlay-title">Ready?</h2>
          <p id="overlay-message">Use Left and Right arrows. Catch green animal-print cards for 10x points.</p>
          <button id="start-btn" type="button">Start Game</button>
        </div>
      </section>

      <section class="controls" aria-label="Touch controls">
        <button id="left-btn" type="button">Left</button>
        <button id="right-btn" type="button">Right</button>
      </section>

      <section class="scoreboard" aria-label="Leaderboard scoreboard">
        <div class="scoreboard-top">
          <h2>Leaderboard</h2>
          <p>Top 8 local runs</p>
        </div>
        <div class="leaderboard-head" aria-hidden="true">
          <span>Rank / Player</span>
          <span>Score</span>
          <span>Time</span>
        </div>
        <ol id="leaderboard-list"></ol>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
